env_requirements:
- name: ANTHROPIC_API_KEY
  description: Claude API key for AI note generation, cross-meeting Q&A, and meeting
    prep
  required: true
  sensitive: true
  default: null
- name: DEEPGRAM_API_KEY
  description: Deepgram API key for Nova-2 transcription backend
  required: false
  sensitive: true
  default: null
- name: FIREBASE_SERVICE_ACCOUNT
  description: Firebase service account JSON for Auth JWT verification and Firestore
    access
  required: true
  sensitive: true
  default: null
- name: GCS_BUCKET
  description: Google Cloud Storage bucket name for audio file storage
  required: true
  sensitive: false
  default: null
- name: GOOGLE_CLOUD_PROJECT
  description: GCP project ID for Pub/Sub, Vertex AI, and other GCP services
  required: true
  sensitive: false
  default: null
- name: WHISPER_ENDPOINT
  description: URL of self-hosted Whisper transcription service
  required: false
  sensitive: false
  default: null
- name: DIARIZATION_ENDPOINT
  description: URL of self-hosted pyannote diarization service (used with Whisper
    backend)
  required: false
  sensitive: false
  default: null
- name: EMBEDDING_ENDPOINT
  description: URL of self-hosted embedding endpoint (alternative to Vertex AI text-embedding-004)
  required: false
  sensitive: false
  default: null
- name: GOOGLE_CALENDAR_CLIENT_ID
  description: OAuth2 client ID for Google Calendar integration (implied by OAuth2
    flow)
  required: false
  sensitive: true
  default: null
- name: GOOGLE_CALENDAR_CLIENT_SECRET
  description: OAuth2 client secret for Google Calendar integration (implied by OAuth2
    flow)
  required: false
  sensitive: true
  default: null
compatibility:
  stacks:
  - node
  min_versions:
    node: '20'
  max_versions: {}

