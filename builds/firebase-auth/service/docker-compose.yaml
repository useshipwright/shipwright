services:
  firebase-emulator:
    build:
      context: .
      dockerfile: Dockerfile.emulator
    ports:
      - "9099:9099"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9099/').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  firebase-auth:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NODE_ENV=production
      - FIREBASE_AUTH_EMULATOR_HOST=firebase-emulator:9099
    depends_on:
      firebase-emulator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
