# =============================================================================
# Custom IAM Roles — Firebase Auth Service (ADR-022)
# =============================================================================
#
# These custom roles replace broad predefined roles with the minimum permissions
# required for each principal. This mitigates the "Privilege Escalation via
# Operator Over-Provisioning" threat by scoping access to exactly what the
# firebase-auth service needs — nothing more.
#
# Usage:
#   gcloud iam roles create ROLE_ID --project=PROJECT --file=ROLE_FILE.yaml
#
# The deploy script (scripts/deploy.sh) manages these roles automatically.
# Set SKIP_CUSTOM_ROLES=true to fall back to predefined roles.
#
# =============================================================================

# ---------------------------------------------------------------------------
# Operator role — replaces 6 predefined roles with a single scoped role
# ---------------------------------------------------------------------------
# Predefined roles replaced:
#   roles/run.admin, roles/cloudbuild.builds.editor,
#   roles/secretmanager.admin, roles/artifactregistry.admin,
#   roles/iam.serviceAccountUser, roles/resourcemanager.projectIamAdmin
#
operator:
  roleId: firebaseAuthPackOperator
  title: "Firebase Auth Service — Operator"
  description: >
    Scoped operator role for deploying and managing the Firebase Auth Service.
    Replaces 6 predefined roles with only the permissions needed for service
    plan, apply, and lifecycle management. Created per ADR-022.
  stage: GA
  includedPermissions:
    # --- Cloud Run (replaces roles/run.admin) ---
    - run.services.create
    - run.services.delete
    - run.services.get
    - run.services.getIamPolicy
    - run.services.list
    - run.services.setIamPolicy
    - run.services.update
    - run.revisions.delete
    - run.revisions.get
    - run.revisions.list
    - run.operations.get

    # --- Cloud Build (replaces roles/cloudbuild.builds.editor) ---
    - cloudbuild.builds.create
    - cloudbuild.builds.get
    - cloudbuild.builds.list

    # --- Secret Manager (replaces roles/secretmanager.admin) ---
    - secretmanager.secrets.create
    - secretmanager.secrets.delete
    - secretmanager.secrets.get
    - secretmanager.secrets.getIamPolicy
    - secretmanager.secrets.list
    - secretmanager.secrets.setIamPolicy
    - secretmanager.secrets.update
    - secretmanager.versions.add
    - secretmanager.versions.get
    - secretmanager.versions.list
    # Note: secretmanager.versions.access intentionally excluded —
    # operator should not read secret values, only manage them.

    # --- Artifact Registry (replaces roles/artifactregistry.admin) ---
    - artifactregistry.repositories.create
    - artifactregistry.repositories.delete
    - artifactregistry.repositories.get
    - artifactregistry.repositories.getIamPolicy
    - artifactregistry.repositories.list
    - artifactregistry.repositories.setIamPolicy
    - artifactregistry.repositories.update

    # --- IAM (replaces roles/iam.serviceAccountUser) ---
    - iam.serviceAccounts.actAs
    - iam.serviceAccounts.create
    - iam.serviceAccounts.get
    - iam.serviceAccounts.list

    # --- Project IAM (replaces roles/resourcemanager.projectIamAdmin) ---
    - resourcemanager.projects.getIamPolicy
    - resourcemanager.projects.setIamPolicy

    # --- Service Usage (API enablement checks during preflight) ---
    - serviceusage.services.get
    - serviceusage.services.list
    - serviceusage.services.enable

# ---------------------------------------------------------------------------
# Cloud Build SA role — replaces 3 predefined roles
# ---------------------------------------------------------------------------
# Predefined roles replaced:
#   roles/artifactregistry.writer, roles/run.developer,
#   roles/iam.serviceAccountUser
#
cloud_build_sa:
  roleId: firebaseAuthPackBuilder
  title: "Firebase Auth Service — Cloud Build SA"
  description: >
    Scoped Cloud Build service account role for building and deploying
    the Firebase Auth Service container. Replaces 3 predefined roles with
    only the permissions needed for image push and service deploy.
    Created per ADR-022.
  stage: GA
  includedPermissions:
    # --- Artifact Registry (replaces roles/artifactregistry.writer) ---
    - artifactregistry.repositories.downloadArtifacts
    - artifactregistry.repositories.uploadArtifacts
    - artifactregistry.dockerimages.get
    - artifactregistry.dockerimages.list

    # --- Cloud Run (replaces roles/run.developer) ---
    - run.services.get
    - run.services.update
    - run.revisions.get
    - run.revisions.list
    - run.operations.get

    # --- IAM (replaces roles/iam.serviceAccountUser) ---
    - iam.serviceAccounts.actAs
