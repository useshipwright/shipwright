  - T-003
  - T-007
  - T-008
  - T-009
  - T-002
  inputs: []
  outputs:
  - packs/firebase-auth/template/src/plugins/metrics.ts
  acceptance_criteria:
  - metrics.ts registers http_requests_total counter with method and path labels
  - metrics.ts registers http_request_duration_seconds histogram
  - metrics.ts registers firebase_admin_calls_total counter and firebase_admin_call_duration_seconds
    histogram
  - metrics.ts registers rate_limit_exceeded_total counter with class label
  - metrics.ts registers active_connections gauge
  - metrics.ts exposes GET /metrics route that returns Prometheus text format without
    authentication
  - metrics.ts exports a metricsWrapper function for wrapping firebase-adapter calls
  - onRequest and onResponse hooks measure HTTP request duration and increment counters
  - Plugin is implemented as a Fastify plugin registered in plugins/index.ts barrel
    file
  checks:
  - lint
  - typecheck
  allowed_paths:
  - packs/firebase-auth/template/src/plugins/metrics.ts
  risk: low
  requires_approval: false
  status: todo
  capability_ids: []
  injected_by_review: false
  domain_tags: []
  doc_packets: []
  roles: []
- id: T-011
  name: API key auth plugin
  description: 'Implement the Fastify onRequest authentication hook. Skips /health
    and /metrics. Reads X-API-Key header and performs constant-time comparison using
    crypto.timingSafeEqual against all configured keys. On match, decorates request
    with apiKeyId. Returns 401 on failure.

    '
  deps:
  - T-004
  - T-007
  - T-008
  - T-009
  - T-010
  - T-003
  - T-002
  inputs: []
  outputs:
  - packs/firebase-auth/template/src/plugins/api-key-auth.ts
  acceptance_criteria:
  - api-key-auth.ts skips authentication for GET /health and GET /metrics routes
  - api-key-auth.ts reads the X-API-Key header from incoming requests
  - api-key-auth.ts uses crypto.timingSafeEqual for constant-time comparison against
    all configured keys
  - api-key-auth.ts iterates all keys without early exit on first mismatch to prevent
    timing attacks
  - api-key-auth.ts decorates request.apiKeyId with the sha256 prefix on successful
    match
  - api-key-auth.ts returns 401 with generic message on missing or invalid key, not
    distinguishing between the two
  - api-key-auth.ts never logs API key values
  - Plugin is implemented as a Fastify plugin registered in plugins/index.ts barrel
    file
  checks:
  - lint
  - typecheck
  allowed_paths:
  - packs/firebase-auth/template/src/plugins/api-key-auth.ts
  risk: high
  requires_approval: true
  status: todo
  capability_ids: []
  injected_by_review: false
  domain_tags: []
  doc_packets: []
  roles: []
- id: T-012
  name: Rate limiter plugin
  description: 'Implement in-memory sliding-window rate limiting per ADR-002. Three
    token buckets per API key (read, mutation, batch). Route metadata declares applicable
    classes. Endpoints in multiple classes consume from all buckets. Returns 429 with
    Retry-After header on exceeded limits.

    '
  deps:
  - T-004
  - T-010
  - T-011
  - T-003
  - T-002
  inputs: []
  outputs:
  - packs/firebase-auth/template/src/plugins/rate-limiter.ts
  acceptance_criteria:
  - rate-limiter.ts implements in-memory sliding-window rate limiting per ADR-002
  - rate-limiter.ts maintains three buckets per API key for read, mutation, and batch
    classes
  - rate-limiter.ts reads limits from config (RATE_LIMIT_READ, RATE_LIMIT_MUTATION,
    RATE_LIMIT_BATCH)
  - rate-limiter.ts uses preHandler hook so it runs after api-key-auth (apiKeyId is
    available)
  - Endpoints in multiple rate classes (e.g., batch-verify) consume from all applicable
    buckets
  - rate-limiter.ts returns 429 with Retry-After header when any bucket is exceeded
  - rate-limiter.ts increments rate_limit_exceeded_total Prometheus counter with class
    label on exceed
  - Plugin is implemented as a Fastify plugin registered in plugins/index.ts barrel
    file
  checks:
  - lint
  - typecheck
  allowed_paths:
  - packs/firebase-auth/template/src/plugins/rate-limiter.ts
  risk: medium
  requires_approval: false
  status: todo
  capability_ids: []
  injected_by_review: false
  domain_tags: []
  doc_packets: []
  roles: []
