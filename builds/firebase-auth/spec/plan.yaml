  roles: []
- id: T-010
  name: Metrics plugin
  description: 'Implement Prometheus metrics collection using prom-client. Registers
    counters and histograms for HTTP requests, Firebase SDK calls, rate limit violations,
    and active connections. Uses onRequest/onResponse hooks for HTTP metrics. Exposes
    GET /metrics endpoint without auth.

    '
