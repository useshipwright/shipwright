tasks:
- id: T-001
  name: Finalize pack manifest
  description: 'Create the pack.yaml manifest with all metadata, capability declarations,
    environment variable definitions, host requirements, and deploy configuration
    for the firebase-auth pack. This is the root artifact that the Shipwright engine
    reads to understand the pack.

    '
  deps: []
  inputs: []
  outputs:
  - packs/firebase-auth/pack.yaml
  acceptance_criteria:
  - pack.yaml has id set to firebase-auth and a descriptive name field
  - pack.yaml declares all 9 capabilities matching the pack contract (token_verification,
    user_lookup, user_management, custom_claims, session_cookies, token_operations,
    email_action_links, batch_operations, health)
  - pack.yaml lists all 11 env_requirements from the pack contract (FIREBASE_SERVICE_ACCOUNT_JSON,
    API_KEYS, PORT, LOG_LEVEL, RATE_LIMIT_READ, RATE_LIMIT_MUTATION, RATE_LIMIT_BATCH,
    SESSION_COOKIE_MAX_AGE, SHUTDOWN_TIMEOUT, NODE_ENV, CORS_ORIGIN)
  - pack.yaml specifies deploy.service_account.name and required IAM roles including
    firebaseauth.admin, iam.serviceAccountTokenCreator, and serviceusage.serviceUsageConsumer
    per ADR-011
  - pack.yaml specifies compatibility.min_versions.node as 22 and compatibility.min_versions.pnpm
    as 8
  - pack.yaml lists all host_requirements from the pack contract
  - pack.yaml is valid YAML and parseable without errors
  - '[THREAT] Default ingress is internal-only, but misconfiguration could expose
    the service publicly. Pack deploy should explicitly set --ingress=internal. Smoke '
  checks:
  - lint
  allowed_paths:
  - packs/firebase-auth/pack.yaml
  risk: low
  requires_approval: false
  status: todo
  capability_ids: []
  injected_by_review: false
  domain_tags: []
  doc_packets: []
  roles: []
- id: T-002
  name: Scaffold project structure
  description: 'Set up the foundational project files including package.json with
    all production and dev dependencies, TypeScript configuration targeting Node 22,
    ESLint and Prettier configs, and Vitest test configuration. This establishes the
    toolchain all subsequent tasks depend on.

    '
  deps:
  - T-001
  inputs: []
  outputs:
  - packs/firebase-auth/template/package.json
  - packs/firebase-auth/template/tsconfig.json
  - packs/firebase-auth/template/.eslintrc.cjs
  - packs/firebase-auth/template/.prettierrc
  - packs/firebase-auth/template/vitest.config.ts
  acceptance_criteria:
  - package.json has name, version, and main/types entry points
  - package.json lists all production dependencies including fastify, firebase-admin,
    prom-client, and pino
  - package.json lists dev dependencies including typescript, vitest, eslint, prettier,
    and their plugins
  - package.json scripts include dev, build, start, test, lint, and format
  - tsconfig.json targets ES2022 or later with NodeNext module resolution for Node
    22
  - tsconfig.json enables strict mode and sets outDir to dist
  - .eslintrc.cjs configures TypeScript ESLint parser and recommended rules
  - .prettierrc sets consistent formatting options (singleQuote, trailingComma, printWidth)
  - vitest.config.ts configures test root, coverage, and any path aliases matching
    tsconfig
  - package.json engine field requires node >= 22 and pnpm >= 8
  - '[THREAT] Flat authorization model enables privilege escalation'
  checks: []
  allowed_paths:
  - packs/firebase-auth/template/package.json
  - packs/firebase-auth/template/tsconfig.json
  - packs/firebase-auth/template/.eslintrc.cjs
  - packs/firebase-auth/template/.prettierrc
  - packs/firebase-auth/template/vitest.config.ts
  risk: low
  requires_approval: false
  status: todo
  capability_ids: []
  injected_by_review: false
  domain_tags: []
  doc_packets: []
  roles: []
- id: T-003
  name: Shared types and interfaces
  description: 'Define all shared TypeScript types and interfaces used across the
    application layers. Includes domain shapes like UserProfile, DecodedToken, BatchVerifyResult,
    AuditEntry, ErrorResponse, RateLimitClass, RouteMetadata, and the FirebaseAdapter
    interface.

    '
  deps:
  - T-002
  inputs: []
  outputs:
  - packs/firebase-auth/template/src/domain/types.ts
  acceptance_criteria:
  - types.ts exports a UserProfile type with uid, email, emailVerified, displayName,
    phoneNumber, photoURL, disabled, metadata, customClaims, and providerData fields
  - types.ts exports a DecodedToken type with uid, email, emailVerified, claims, iss,
    aud, iat, exp, and auth_time fields
  - types.ts exports a BatchVerifyResult type with results array (valid, uid, email,
    claims, error) and summary (total, valid, invalid)
  - types.ts exports an AuditEntry type with event, target, and changes fields
  - types.ts exports an ErrorResponse type with error object containing code (numeric),
    message, and requestId
  - types.ts exports a RateLimitClass enum or union type with read, mutation, and
    batch values
  - types.ts exports a RouteMetadata type with rateLimitClasses array
  - types.ts exports a FirebaseAdapter interface listing all adapter methods from
    the architecture
  - All types use readonly modifiers where appropriate for immutability
  - '[BARREL] Verify this module is imported and registered in the barrel file (routes/index.ts
    or plugins/index.ts)'
  - '[OPUS] Remove the BARREL criterion. Replace with - types.ts is importable via
    domain/types and consumed by firebase-adapter and all route modules'
  checks:
  - lint
  - typecheck
  allowed_paths:
  - packs/firebase-auth/template/src/domain/types.ts
  risk: low
  requires_approval: false
  status: todo
  capability_ids: []
  injected_by_review: false
  domain_tags: []
  doc_packets: []
  roles: []
- id: T-004
  name: Config module
  description: 'Implement the configuration module that loads, validates, and exports
    a typed frozen config object from environment variables. Parses FIREBASE_SERVICE_ACCOUNT_JSON
    and API_KEYS, deriving key IDs as sha256(key).slice(0,8) per ADR-003. Fails fast
    on missing required vars.

    '
  deps:
  - T-003
  - T-002
  inputs: []
  outputs:
  - packs/firebase-auth/template/src/infra/config.ts
  acceptance_criteria:
  - config.ts reads and validates FIREBASE_SERVICE_ACCOUNT_JSON (required, sensitive)
  - config.ts reads and validates API_KEYS (required, sensitive), parsing comma-separated
    values into a Map keyed by sha256(key).slice(0,8) per ADR-003
  - config.ts reads PORT with default 3000
  - config.ts reads LOG_LEVEL with default info
  - config.ts reads RATE_LIMIT_READ with default 200
  - config.ts reads RATE_LIMIT_MUTATION with default 50
  - config.ts reads RATE_LIMIT_BATCH with default 20
  - config.ts reads SESSION_COOKIE_MAX_AGE with default 1209600000
  - config.ts reads SHUTDOWN_TIMEOUT with default 10000
  - config.ts reads NODE_ENV with default production
  - config.ts reads CORS_ORIGIN (optional, no default) and logs a warning if unset
    in production
  - config.ts throws a descriptive error at startup if FIREBASE_SERVICE_ACCOUNT_JSON
    or API_KEYS is missing or empty
  - Exported config object is frozen (Object.freeze) to prevent mutation
  - FIREBASE_SERVICE_ACCOUNT_JSON is parsed as JSON and the credential is only exposed
    via a serviceAccountCredential field
  checks:
  - lint
  - typecheck
  allowed_paths:
  - packs/firebase-auth/template/src/infra/config.ts
  risk: medium
  requires_approval: false
  status: todo
  capability_ids: []
  injected_by_review: false
  domain_tags: []
  doc_packets: []
  roles: []
- id: T-005
  name: Domain validators
  description: 'Implement pure validation functions with no external dependencies.
    Each function returns a result object with valid boolean and optional error string.
    Covers email, phone (E.164), UID, JWT structure, claims size/reserved names, session
    duration, and batch size validation.

    '
  deps:
  - T-003
  - T-002
  inputs: []
  outputs:
  - packs/firebase-auth/template/src/domain/validators.ts
  acceptance_criteria:
  - validators.ts exports validateEmail that checks for valid email format
  - validators.ts exports validatePhone that validates E.164 phone number format (leading
    +, digits only, 7-15 digits)
  - validators.ts exports validateUid that enforces max 128 character limit and non-empty
  - validators.ts exports validateJwtStructure that checks for 3 dot-separated base64url
    segments
  - validators.ts exports validateClaimsSize that enforces JSON.stringify().length
    <= 1000 characters per ADR-009/ADR-010
  - validators.ts exports validateReservedClaims that rejects Firebase reserved claim
    names
  - validators.ts exports validateSessionDuration that enforces range 300000ms to
    1209600000ms
  - validators.ts exports validateBatchSize that checks array length against a configurable
    max
  - All validators return a consistent shape with valid boolean and optional error
    string
  - Validators have no side effects, no HTTP concerns, and no imports from other application
    modules
  checks:
  - lint
  - typecheck
  allowed_paths:
  - packs/firebase-auth/template/src/domain/validators.ts
  risk: low
  requires_approval: false
  status: todo
  capability_ids: []
  injected_by_review: false
  domain_tags: []
  doc_packets: []
  roles: []
- id: T-006
  name: Firebase Admin SDK adapter
  description: 'Implement the thin adapter wrapping firebase-admin/auth per ADR-001.
    This is the ONLY module that imports firebase-admin. Initializes the SDK from
    the config service account credential, performs a startup health probe per ADR-004,
    and exposes all Admin Auth SDK methods as async functions.

    '
  deps:
  - T-004
  - T-003
  - T-002
  inputs: []
  outputs:
  - packs/firebase-auth/template/src/infra/firebase-adapter.ts
  acceptance_criteria:
  - firebase-adapter.ts is the only module that imports firebase-admin
  - firebase-adapter.ts initializes Firebase Admin SDK using the serviceAccountCredential
    from config
  - firebase-adapter.ts exports all methods listed in the architecture (verifyIdToken,
    getUser, getUserByEmail, getUserByPhoneNumber, getUsers, createUser, updateUser,
    deleteUser, deleteUsers, listUsers, setCustomUserClaims, revokeRefreshTokens,
    createSessionCookie, verifySessionCookie, createCustomToken, generatePasswordResetLink,
    generateEmailVerificationLink, generateSignInWithEmailLink)
  - firebase-adapter.ts exports an isHealthy() method returning boolean
  - firebase-adapter.ts exports a projectId getter
  - Startup health probe calls getUser with a nonexistent UID and expects auth/user-not-found
    per ADR-004
  - Startup fails fast if health probe returns any error other than auth/user-not-found
  - Adapter implements the FirebaseAdapter interface from domain/types.ts
  - '[PRD-FIX] Use roles/firebaseauth.admin is confirmed as ''Full read/write access''.
    However, the docs note TWO additional requirements not listed in the PRD: (1)
    createCustomToken() requires iam.serviceAccounts...'
  checks:
  - lint
  - typecheck
  allowed_paths:
  - packs/firebase-auth/template/src/infra/firebase-adapter.ts
  risk: medium
  requires_approval: false
  status: todo
  capability_ids: []
  injected_by_review: false
  domain_tags: []
  doc_packets: []
  roles: []
- id: T-007
  name: Log redactor plugin
  description: 'Implement the Pino log redaction configuration and helper functions.
    Configures redaction paths for API keys in headers, password fields in request
    bodies, and PII. Exports redactEmail() and redactUid() helpers for partial redaction
    in audit and error contexts.

    '
  deps:
  - T-003
  - T-002
  inputs: []
  outputs:
  - packs/firebase-auth/template/src/plugins/log-redactor.ts
  acceptance_criteria:
  - log-redactor.ts exports Pino redact configuration that covers req.headers["x-api-key"]
    and request body password fields
  - log-redactor.ts exports a redactEmail() helper that partially redacts emails (e.g.,
    u***@example.com)
  - log-redactor.ts exports a redactUid() helper that partially redacts UIDs (e.g.,
    abc...xyz)
  - redactEmail() and redactUid() handle malformed or adversarial input safely without
    throwing
  - Plugin is implemented as a Fastify plugin registered in plugins/index.ts barrel
    file
  - Redaction paths prevent FIREBASE_SERVICE_ACCOUNT_JSON from appearing in any log
    output
  checks:
  - lint
  - typecheck
  allowed_paths:
  - packs/firebase-auth/template/src/plugins/log-redactor.ts
  risk: medium
  requires_approval: false
  status: todo
  capability_ids: []
  injected_by_review: false
  domain_tags: []
  doc_packets: []
  roles: []
- id: T-008
  name: Request context plugin
  description: 'Implement the Fastify onRequest hook that reads or generates X-Request-ID
    for correlation. Decorates the request with requestId and creates a Pino child
    logger with the requestId binding. Sets X-Request-ID on the response for downstream
    correlation.

    '
