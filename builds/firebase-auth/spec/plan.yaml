- id: T-015
  name: Token verification routes
  description: 'Implement POST /verify for single token verification and POST /batch-verify
    for batch verification of up to 25 tokens. Validates JWT structure before passing
    to Firebase SDK. Batch returns per-token results with a summary of total, valid,
    and invalid counts.

    '
  deps:
  - T-005
  - T-006
  - T-013
  - T-003
  - T-002
  inputs: []
  outputs:
  - packs/firebase-auth/template/src/routes/verify.ts
  acceptance_criteria:
  - verify.ts implements POST /verify accepting token (required) and checkRevoked
    (optional, default false)
  - POST /verify validates JWT structure (3 dot-separated base64url segments) before
    calling Firebase SDK
  - POST /verify returns decoded claims including uid, email, emailVerified, claims,
    iss, aud, iat, exp, auth_time on success
  - verify.ts implements POST /batch-verify accepting tokens array (max 25 entries)
  - POST /batch-verify returns per-token results with valid, uid, email, claims, and
    error fields plus a summary with total, valid, and invalid counts
  - POST /batch-verify returns 400 for empty array or arrays exceeding 25 tokens
  - Route is registered in routes/index.ts barrel file
  - '[THREAT] verifyIdToken without checkRevoked=true performs local JWT verification
    only (no network call). Revoked tokens remain valid until natural expiry (up t'
  checks:
  - lint
  - typecheck
  allowed_paths:
  - packs/firebase-auth/template/src/routes/verify.ts
  risk: medium
  requires_approval: false
  status: todo
  capability_ids:
  - CAP-001
  injected_by_review: false
  domain_tags: []
  doc_packets: []
  roles: []
- id: T-016
  name: User lookup routes
  description: 'Implement user lookup endpoints: GET /users/:uid, GET /users/by-email/:email,
    GET /users/by-phone/:phoneNumber, and POST /users/batch. Validates inputs and
    returns full UserProfile shapes. Batch lookup supports up to 100 mixed identifiers
    per ADR-008.

    '
  deps:
  - T-005
  - T-006
  - T-013
  - T-014
  - T-015
  - T-003
  - T-002
  inputs: []
  outputs:
  - packs/firebase-auth/template/src/routes/users-lookup.ts
  acceptance_criteria:
  - users-lookup.ts implements GET /users/:uid with UID validation (max 128 chars)
  - users-lookup.ts implements GET /users/by-email/:email with email format validation
  - users-lookup.ts implements GET /users/by-phone/:phoneNumber with E.164 phone validation
  - users-lookup.ts implements POST /users/batch accepting up to 100 mixed identifiers
    per ADR-008
  - POST /users/batch validates each identifier has exactly one key (uid, email, or
    phoneNumber)
  - All lookup endpoints return UserProfile shape on success and 404 for not found
  - All lookup endpoints return 400 for invalid input format
  - Route is registered in routes/index.ts barrel file
