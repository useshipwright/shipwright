- id: T-009
  name: Error handler plugin
  description: 'Implement the Fastify setErrorHandler that maps Firebase Admin error
    codes and validation errors to proper HTTP status codes per ADR-006 and ADR-007.
    Ensures all error responses use the standard envelope shape with numeric code,
    message, and requestId.

    '
  deps:
  - T-003
  - T-007
  - T-008
  - T-002
  inputs: []
  outputs:
  - packs/firebase-auth/template/src/plugins/error-handler.ts
  acceptance_criteria:
  - error-handler.ts maps auth/user-not-found to 404
  - error-handler.ts maps auth/id-token-expired, auth/id-token-revoked, and auth/argument
    to 401
  - error-handler.ts maps auth/invalid-* errors to 400
  - error-handler.ts maps auth/insufficient-permission to 500
  - error-handler.ts maps auth/quota-exceeded to 503
  - error-handler.ts maps auth/internal-error and network errors to 502 per ADR-007
  - error-handler.ts maps Fastify validation errors to 400
  - All error responses use the shape with error.code as numeric HTTP status, error.message,
    and error.requestId per ADR-006
  - Generic messages are returned for 401 and 403 responses to prevent information
    leakage
  - Detailed errors are logged server-side only via request.log
  - Plugin is implemented as a Fastify plugin registered in plugins/index.ts barrel
    file
  checks:
  - lint
  - typecheck
  allowed_paths:
  - packs/firebase-auth/template/src/plugins/error-handler.ts
  risk: medium
  requires_approval: false
  status: todo
  capability_ids: []
  injected_by_review: false
