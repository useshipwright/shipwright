  - T-003
  - T-007
  - T-002
  inputs: []
  outputs:
  - packs/firebase-auth/template/src/plugins/request-context.ts
  acceptance_criteria:
  - request-context.ts reads X-Request-ID from the incoming request header if present
  - request-context.ts generates a UUIDv4 if X-Request-ID header is absent
  - request-context.ts decorates request.requestId with the correlation ID
  - request-context.ts sets X-Request-ID header on the response
  - request-context.ts creates a Pino child logger bound with the requestId
  - Plugin is implemented as a Fastify plugin registered in plugins/index.ts barrel
    file
  checks:
  - lint
  - typecheck
  allowed_paths:
  - packs/firebase-auth/template/src/plugins/request-context.ts
  risk: low
