  - T-003
  - T-007
  - T-008
  - T-009
  - T-010
  - T-011
  - T-012
  - T-002
  inputs: []
  outputs:
  - packs/firebase-auth/template/src/plugins/audit-logger.ts
  acceptance_criteria:
  - audit-logger.ts exports an emitAudit(request, AuditEntry) function
  - Audit entries include event type, actor (request.apiKeyId), target UID, ISO-8601
    timestamp, and requestId
  - Audit entries include changes.fields (field names only, no values) to avoid PII
    leakage
  - Audit entries are written as structured JSON to stdout via request.log
  - emitAudit never logs PII values (passwords, full emails, full phone numbers)
  - Plugin is implemented as a Fastify plugin registered in plugins/index.ts barrel
